    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is EMI and how is it calculated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EMI (Equated Monthly Installment) is a fixed monthly repayment amount for your home loan. It is calculated using the formula: EMI = P × r × (1+r)^n / ((1+r)^n - 1), where P is the loan amount, r is the monthly interest rate (annual rate ÷ 12 ÷ 100), and n is the tenure in months."
          }
        },
        {
          "@type": "Question",
          "name": "How much home loan EMI for ₹50 lakh?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For a ₹50 lakh home loan at 8.5% interest rate for 20 years, the monthly EMI is approximately ₹43,391. At 7.5% for 20 years, the EMI is approximately ₹40,280. Use HomeLoanCalc to get the exact EMI for your specific rate and tenure."
          }
        },
        {
          "@type": "Question",
          "name": "How much home loan EMI for ₹1 crore?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For a ₹1 crore home loan at 8.5% for 20 years, the monthly EMI is approximately ₹86,782. At 7.5% for 20 years, the EMI is approximately ₹80,559. The exact amount depends on the bank's interest rate and your chosen tenure."
          }
        },
        {
          "@type": "Question",
          "name": "How does tenure affect total interest on a home loan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A longer tenure reduces your monthly EMI but significantly increases the total interest paid. For example, a ₹50 lakh loan at 8% — a 20-year tenure costs about ₹50.4 lakh in interest, while a 10-year tenure costs only ₹24.3 lakh. Choosing a shorter tenure saves substantial interest."
          }
        },
        {
          "@type": "Question",
          "name": "What is the benefit of prepaying a home loan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Prepayments directly reduce the outstanding principal, which lowers the interest charged in subsequent months. Even a small monthly prepayment of ₹5,000 on a ₹50 lakh loan can save over ₹8 lakh in interest and close the loan 3–4 years earlier. Use the prepayment calculator to see exact savings."
          }
        },
        {
          "@type": "Question",
          "name": "What tax benefits are available on home loans in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Home loan borrowers in India can claim: (1) Section 80C — deduction up to ₹1.5 lakh per year on principal repayment; (2) Section 24B — deduction up to ₹2 lakh per year on interest paid for self-occupied property. HomeLoanCalc's tax benefit section shows your exact savings year by year."
          }
        },
        {
          "@type": "Question",
          "name": "Is it better to reduce EMI or tenure when interest rates change?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Reducing the tenure saves more total interest but keeps your EMI unchanged. Reducing the EMI provides immediate cash-flow relief but you pay more interest overall. If you can afford the current EMI, reducing tenure is the better financial choice."
          }
        },
        {
          "@type": "Question",
          "name": "How much home loan can I get on my salary?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most banks allow a maximum EMI of 40–50% of your net monthly income. For example, with a ₹1 lakh monthly salary and no existing EMIs, you may be eligible for a home loan EMI of up to ₹50,000, which translates to approximately ₹62 lakh at 8.5% for 20 years. Use HomeLoanCalc's eligibility calculator for a precise estimate."
          }
        }
      ]
    }
    </script>
