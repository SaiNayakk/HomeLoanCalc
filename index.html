    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is EMI and how is it calculated?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "EMI (Equated Monthly Installment) is your fixed monthly repayment. It is calculated using the principal, interest rate, and tenure so that each payment includes both interest and principal."
            }
          },
          {
            "@type": "Question",
            "name": "How does tenure affect total interest?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A longer tenure lowers EMI but increases total interest paid. A shorter tenure increases EMI but reduces interest cost."
            }
          },
          {
            "@type": "Question",
            "name": "What is the benefit of prepaying a home loan?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Prepayments reduce outstanding principal, which cuts interest and can shorten the loan tenure significantly."
            }
          },
          {
            "@type": "Question",
            "name": "Is it better to reduce EMI or tenure when rates change?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Reducing tenure saves more interest in the long run, while reducing EMI improves monthly cash flow. Choose based on your financial comfort."
            }
          },
          {
            "@type": "Question",
            "name": "How do rate changes affect my loan?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Higher rates increase interest cost; lower rates reduce it. You can choose to keep EMI the same and shorten tenure or keep tenure and reduce EMI."
            }
          }
        ]
      }
